name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  checks: write

jobs:
  quality:
    name: "Quality"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.41.4
          environments: ci

      - name: Lint
        run: pixi run -e ci lint

      - name: Format check
        run: pixi run -e ci format-check

      - name: Type check
        run: pixi run -e ci type-check

  test:
    name: "Test"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.41.4
          environments: ci

      - name: Run tests
        run: pixi run -e ci test

  security:
    name: "Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.41.4
          environments: ci

      - name: Security scan
        run: pixi run -e ci security

  ci-success:
    name: "CI Success"
    runs-on: ubuntu-latest
    needs: [quality, test, security]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.quality.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "CI passed"
